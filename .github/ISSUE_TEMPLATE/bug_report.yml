name: Bug report
description: Report a repository defect in code, scripts, manifests or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and its impact.
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Example: docs, compose, k8s, gitops, labs, workflow.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands or actions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, tools and relevant versions.
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Paste concise evidence if available.
