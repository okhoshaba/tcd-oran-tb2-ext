# Flux bootstrap and GitRepository source definitions are not included here.
# Replace OWNER in the matching GitRepository separately before using these examples.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tb2-ext-group-01
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/group-01
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: tcd-oran-tb2-ext
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tb2-ext-group-10
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/overlays/group-10
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: tcd-oran-tb2-ext
